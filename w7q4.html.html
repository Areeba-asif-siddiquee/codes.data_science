<!DOCTYPE html>
<html>
<body>

<script>
// Take input from user
let day = prompt("Enter day (1-31):");
let month = prompt("Enter month (1-12):");
let year = prompt("Enter year (e.g., 2024):");

// Create Date object (month is 0-based, so subtract 1)
let d = new Date(year, month - 1, day);

// Array of days
let days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

// Output result
alert("The day is: " + days[d.getDay()]);
</script>

</body>
</html>
