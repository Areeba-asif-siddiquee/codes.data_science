<!DOCTYPE html>
<html>
<body>

<h2 id="clock"></h2>

<script>
function showTime() {
    let d = new Date();

    let h = d.getHours();
    let m = d.getMinutes();
    let s = d.getSeconds();

    // Display time
    document.getElementById("clock").innerHTML = h + ":" + m + ":" + s;
}

// Update every 1 second
setInterval(showTime, 1000);
</script>

</body>
</html>
